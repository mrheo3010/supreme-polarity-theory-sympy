name: Verify all SymPy scripts PASS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Re-verify weekly to catch sympy upstream regressions
  schedule:
    - cron: "0 6 * * 0"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    name: Verify (Python ${{ matrix.python }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all SymPy scripts
        run: bash verify_all.sh

      - name: Verify INVENTORY.md is up-to-date
        run: |
          python3 .github/scripts/build_inventory.py
          if ! git diff --quiet -- INVENTORY.md docs/; then
            echo "::error::INVENTORY.md or docs/ are stale — re-run build_inventory.py and commit"
            git diff --stat -- INVENTORY.md docs/
            exit 1
          fi
